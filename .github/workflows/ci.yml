name: DataForge CI

on:
    push:
        branches:
            - main

jobs: 
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.8'

            - name: Install dbt
              run: pip install dbt-core dbt-snowflake

            - name: Create dbt profile
              run: |
                mkdir -p ~/.dbt
                cat <<EOF > ~/.dbt/profiles.yml
                dbt_dataforge:
                    target: dev
                    outputs:
                        dev:
                            type: snowflake
                            account: dummy_account
                            user: dummy_user
                            password: dummy_password
                            role: dummy_role
                            database: dummy_database
                            warehouse: dummy_warehouse
                            schema: public
                            threads: 1
                EOF   

            - name: Run dbt
              run: |
                cd dbt_dataforge
                dbt parse

